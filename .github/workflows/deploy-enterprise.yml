name: Deploy ENTERPRISE backend to VM

on:
  push:
    branches: [ main ]
    paths:
      - 'enterprise backend/**'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 0) Install SSH key from base64 secret (you already created SSH_PRIVATE_KEY_B64)
      - name: Install SSH key (robust)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          # write key, strip CRLF just in case
          printf '%s\n' "$SSH_PRIVATE_KEY" | sed 's/\r$//' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          eval "$(ssh-agent -s)"
          # try add; if it fails, show header for debug
          ssh-add ~/.ssh/id_ed25519 || { echo "Header:"; head -n1 ~/.ssh/id_ed25519; exit 1; }
          # pre-accept host key (no interactive prompt)
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Debug key file (safe)
        run: |
          set -eu
          ls -l ~/.ssh/id_ed25519
          head -n1 ~/.ssh/id_ed25519
          tail -n1 ~/.ssh/id_ed25519
          ssh-keygen -l -f ~/.ssh/id_ed25519 || true
      # 1) Checkout repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2) PACK SUBFOLDER WITH SPACE  (this runs on the *runner*)
      - name: Package only the "enterprise backend" subfolder
        run: |
          tar -czf enterprise-backend.tgz -C "enterprise backend" .

      # 3) Upload bundle to VM  (runner -> VM)
      - name: Upload bundle to VM
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          scp -o StrictHostKeyChecking=no -P "${SSH_PORT:-22}" \
            enterprise-backend.tgz "${SSH_USER}@${SSH_HOST}:/tmp/enterprise-backend.tgz"

      # 4) UPLOAD .env AS A FILE  (runner -> VM)   <<<<<< your first block goes here
      - name: Upload .env to VM
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          ENTERPRISE_ENV: ${{ secrets.ENTERPRISE_ENV }}
        run: |
          printf '%s\n' "$ENTERPRISE_ENV" > enterprise.env
          sed -i 's/\r$//' enterprise.env
          scp -o StrictHostKeyChecking=no -P "${SSH_PORT:-22}" \
            enterprise.env "${SSH_USER}@${SSH_HOST}:/tmp/enterprise.env"
          rm -f enterprise.env

      # 5) REMOTE DEPLOY ON VM (via SSH)  <<<<<< your second block goes inside this heredoc
      - name: Remote deploy on VM
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -o StrictHostKeyChecking=no -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" 'bash -s' <<'REMOTE'
          set -euo pipefail
          APP_DIR="/enterprise"
          PORT="4001"
          HOST="127.0.0.1"

          # Ensure Node 24.x
          if ! node -v 2>/dev/null | grep -q '^v24\.'; then
            curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi

          # Unpack artifact and place .env   <<<<<< corresponds to your first block’s last lines
          mkdir -p "$APP_DIR"
          tar -xzf /tmp/enterprise-backend.tgz -C "$APP_DIR"
          rm -f /tmp/enterprise-backend.tgz
          if [ -f /tmp/enterprise.env ]; then
            tr -d '\r' < /tmp/enterprise.env > "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"
            rm -f /tmp/enterprise.env
          fi

          # NOW paste your second block here (runs on the VM)
          cd /enterprise
          if [ -f package-lock.json ]; then npm ci --omit=dev; else npm i --omit=dev; fi
          command -v pm2 >/dev/null || sudo npm i -g pm2
          PORT=4001 HOST=127.0.0.1 pm2 start index.js --name enterprise --update-env 2>/dev/null || \
          PORT=4001 HOST=127.0.0.1 pm2 reload enterprise --update-env
          pm2 save
          REMOTE

      # (Optional) quick smoke test after deploy
      - name: Smoke test via proxy
        run: |
          curl -sfI "http://${{ secrets.SSH_HOST }}/enterprise/vehicle"
